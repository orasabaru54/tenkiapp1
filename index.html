<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>天気アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --accent: #38bdf8;
    --accent-soft: rgba(56, 189, 248, 0.35);
    --text: #f4f7ff;
    --sub-text: rgba(226, 232, 255, 0.62);
    --card-bg: rgba(20, 24, 46, 0.55);
    --card-border: rgba(255, 255, 255, 0.09);
    --stat-bg: rgba(255, 255, 255, 0.05);
    --stat-border: rgba(255, 255, 255, 0.08);
    --transition-color: 0.6s ease;
  }
  *{ box-sizing: border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 28px 16px;
    background: radial-gradient(120% 90% at 15% 0%, #262a5e 0%, transparent 55%),
                radial-gradient(120% 90% at 100% 100%, #1c3a5e 0%, transparent 55%),
                linear-gradient(160deg, #0b0e23 0%, #0a0c1a 60%, #05060f 100%);
    color: var(--text);
    overflow-x: hidden;
    position: relative;
  }
  .blob{
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.55;
    pointer-events: none;
    z-index: 0;
    transition: background var(--transition-color);
  }
  .blob-1{
    width: 380px; height: 380px;
    top: -120px; left: -100px;
    background: var(--accent);
    animation: drift1 16s ease-in-out infinite;
  }
  .blob-2{
    width: 320px; height: 320px;
    bottom: -140px; right: -80px;
    background: #7c3aed;
    animation: drift2 20s ease-in-out infinite;
  }
  @keyframes drift1{
    0%, 100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(40px, 30px) scale(1.1); }
  }
  @keyframes drift2{
    0%, 100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(-30px, -25px) scale(1.08); }
  }
  .app{
    width:100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
  }
  .header{
    text-align:center;
    margin-bottom: 24px;
  }
  .header .brand{
    display:inline-flex;
    align-items:center;
    gap: 8px;
    font-family: "Space Grotesk", sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .header .brand .dot{
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px 3px var(--accent-soft);
    transition: background var(--transition-color), box-shadow var(--transition-color);
  }
  .header p{
    margin: 6px 0 0;
    font-size: 12.5px;
    letter-spacing: 0.04em;
    color: var(--sub-text);
    text-transform: uppercase;
  }
  .city-tabs{
    position: relative;
    display:flex;
    background: rgba(255,255,255,0.04);
    padding: 5px;
    border-radius: 16px;
    margin-bottom: 18px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .tab-indicator{
    position: absolute;
    top: 5px; bottom: 5px;
    left: 5px;
    width: 100px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    box-shadow: 0 4px 16px var(--accent-soft);
    transition: left 0.35s cubic-bezier(.65,0,.35,1), width 0.35s cubic-bezier(.65,0,.35,1), background var(--transition-color);
    z-index: 0;
  }
  .city-tabs button{
    position: relative;
    z-index: 1;
    flex:1;
    border:none;
    background: transparent;
    color: var(--sub-text);
    padding: 11px 8px;
    font-family: inherit;
    font-size: 14.5px;
    font-weight: 700;
    border-radius: 12px;
    cursor:pointer;
    transition: color 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .city-tabs button.active{
    color: #05060f;
  }
  .card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 26px;
    padding: 30px 26px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 20px 50px -12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
    overflow:hidden;
    min-height: 320px;
  }
  .card::before{
    content:"";
    position:absolute;
    inset: -1px;
    padding: 1px;
    border-radius: 26px;
    background: linear-gradient(135deg, var(--accent-soft), transparent 40%, transparent 60%, var(--accent-soft));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events:none;
    opacity: 0.8;
    transition: background var(--transition-color);
  }
  .state{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height: 260px;
    gap: 14px;
    text-align:center;
  }
  .spinner{
    width:34px; height:34px;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: var(--accent);
    border-radius:50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .state.error{ color: #ffb4b4; }
  .state.error .glyph{ font-size: 38px; }
  .retry-btn{
    margin-top: 4px;
    padding: 9px 20px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.06);
    color:#fff;
    font-family: inherit;
    font-size:13.5px;
    font-weight: 600;
    cursor:pointer;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .retry-btn:hover{ background: rgba(255,255,255,0.12); transform: translateY(-1px); }
  .content{
    position:relative;
    z-index:1;
    animation: fadeUp 0.5s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes fadeUp{
    from{ opacity: 0; transform: translateY(10px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  .location{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom: 4px;
  }
  .location .city-name{
    font-family: "Space Grotesk", sans-serif;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .location .updated{
    font-size: 10.5px;
    letter-spacing: 0.03em;
    color: var(--sub-text);
  }
  .main-weather{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 20px;
    margin: 22px 0 6px;
    position: relative;
  }
  .icon-wrap{
    position: relative;
    width: 96px;
    height: 96px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .icon-glow{
    position:absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
    filter: blur(6px);
    transition: background var(--transition-color);
  }
  .emoji{
    position: relative;
    font-size: 76px;
    line-height:1;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.45));
    animation: floaty 3.2s ease-in-out infinite;
  }
  @keyframes floaty{
    0%, 100%{ transform: translateY(0px); }
    50%{ transform: translateY(-8px); }
  }
  .temp-block{
    text-align:left;
  }
  .temp{
    font-family: "Space Grotesk", sans-serif;
    font-size: 58px;
    font-weight: 700;
    line-height:1;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #ffffff 20%, var(--accent) 120%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: background var(--transition-color);
  }
  .temp sup{
    font-size: 24px;
    font-weight: 600;
    vertical-align: super;
  }
  .condition{
    font-size: 15.5px;
    font-weight: 700;
    color: var(--text);
    margin-top: 6px;
    letter-spacing: 0.01em;
  }
  .feels-like{
    text-align:center;
    font-size: 12.5px;
    color: var(--sub-text);
    margin-bottom: 22px;
    letter-spacing: 0.02em;
  }
  .stats{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 6px;
  }
  .stat{
    background: var(--stat-bg);
    border: 1px solid var(--stat-border);
    border-radius: 16px;
    padding: 13px 6px;
    text-align:center;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .stat:hover{
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.18);
  }
  .stat .stat-icon{
    font-size: 16px;
    margin-bottom: 4px;
    display:block;
  }
  .stat .label{
    font-size: 10.5px;
    color: var(--sub-text);
    margin-bottom: 3px;
    letter-spacing: 0.02em;
  }
  .stat .value{
    font-family: "Space Grotesk", sans-serif;
    font-size: 16px;
    font-weight: 700;
  }
  .stat .value .unit{
    font-size: 10.5px;
    font-weight: 500;
    color: var(--sub-text);
    margin-left: 1px;
  }
  footer{
    text-align:center;
    margin-top: 18px;
    font-size: 10.5px;
    letter-spacing: 0.03em;
    color: rgba(226, 232, 255, 0.32);
  }

  @media (max-width: 380px){
    .icon-wrap{ width: 76px; height: 76px; }
    .emoji{ font-size: 60px; }
    .temp{ font-size: 46px; }
    .card{ padding: 24px 18px; }
  }
</style>
</head>
<body>
  <div class="blob blob-1" id="blob1"></div>
  <div class="blob blob-2" id="blob2"></div>

  <div class="app">
    <div class="header">
      <div class="brand"><span class="dot" id="brandDot"></span>WEATHER</div>
      <p>Live forecast · wttr.in</p>
    </div>

    <div class="city-tabs" id="cityTabs">
      <div class="tab-indicator" id="tabIndicator"></div>
      <button data-city="takamatsu" class="active">高松</button>
      <button data-city="tokyo">東京</button>
      <button data-city="osaka">大阪</button>
    </div>

    <div class="card" id="card">
      <div class="state" id="loadingState">
        <div class="spinner"></div>
        <div>読み込み中...</div>
      </div>
    </div>

    <footer>DATA PROVIDED BY WTTR.IN</footer>
  </div>

<script>
(function(){
  const CITIES = {
    takamatsu: { name: "高松", lat: 34.34, lon: 134.05 },
    tokyo:     { name: "東京", lat: 35.6762, lon: 139.6503 },
    osaka:     { name: "大阪", lat: 34.6937, lon: 135.5023 }
  };

  // wttr.in (World Weather Online) weather code -> { emoji, label, category }
  const WEATHER_CODE_MAP = {
    113: { emoji: "☀️", label: "晴れ", category: "sunny" },
    116: { emoji: "⛅", label: "晴れ時々くもり", category: "cloud" },
    119: { emoji: "☁️", label: "くもり", category: "cloud" },
    122: { emoji: "☁️", label: "どんより", category: "cloud" },
    143: { emoji: "🌫️", label: "霧", category: "fog" },
    176: { emoji: "🌦️", label: "にわか雨の可能性", category: "rain" },
    179: { emoji: "🌨️", label: "小雪の可能性", category: "snow" },
    182: { emoji: "🌨️", label: "みぞれの可能性", category: "snow" },
    185: { emoji: "🌧️", label: "着氷性の霧雨の可能性", category: "rain" },
    200: { emoji: "⛈️", label: "雷雨の可能性", category: "thunder" },
    227: { emoji: "❄️", label: "地吹雪", category: "snow" },
    230: { emoji: "❄️", label: "吹雪", category: "snow" },
    248: { emoji: "🌫️", label: "霧", category: "fog" },
    260: { emoji: "🌫️", label: "着氷性の霧", category: "fog" },
    263: { emoji: "🌦️", label: "小雨", category: "rain" },
    266: { emoji: "🌦️", label: "霧雨", category: "rain" },
    281: { emoji: "🌧️", label: "着氷性の霧雨", category: "rain" },
    284: { emoji: "🌧️", label: "強い着氷性の霧雨", category: "rain" },
    293: { emoji: "🌦️", label: "小雨", category: "rain" },
    296: { emoji: "🌧️", label: "小雨", category: "rain" },
    299: { emoji: "🌧️", label: "雨", category: "rain" },
    302: { emoji: "🌧️", label: "雨", category: "rain" },
    305: { emoji: "🌧️", label: "大雨", category: "rain" },
    308: { emoji: "🌧️", label: "大雨", category: "rain" },
    311: { emoji: "🌧️", label: "着氷性の雨", category: "rain" },
    314: { emoji: "🌧️", label: "強い着氷性の雨", category: "rain" },
    317: { emoji: "🌨️", label: "みぞれ", category: "snow" },
    320: { emoji: "🌨️", label: "強いみぞれ", category: "snow" },
    323: { emoji: "🌨️", label: "小雪", category: "snow" },
    326: { emoji: "🌨️", label: "小雪", category: "snow" },
    329: { emoji: "🌨️", label: "雪", category: "snow" },
    332: { emoji: "🌨️", label: "雪", category: "snow" },
    335: { emoji: "❄️", label: "大雪", category: "snow" },
    338: { emoji: "❄️", label: "大雪", category: "snow" },
    350: { emoji: "🧊", label: "あられ", category: "snow" },
    353: { emoji: "🌦️", label: "にわか雨", category: "rain" },
    356: { emoji: "🌧️", label: "強いにわか雨", category: "rain" },
    359: { emoji: "⛈️", label: "激しいにわか雨", category: "thunder" },
    362: { emoji: "🌨️", label: "にわかみぞれ", category: "snow" },
    365: { emoji: "🌨️", label: "強いにわかみぞれ", category: "snow" },
    368: { emoji: "🌨️", label: "にわか雪", category: "snow" },
    371: { emoji: "❄️", label: "強いにわか雪", category: "snow" },
    374: { emoji: "🧊", label: "にわかあられ", category: "snow" },
    377: { emoji: "🧊", label: "強いにわかあられ", category: "snow" },
    386: { emoji: "⛈️", label: "雷雨", category: "thunder" },
    389: { emoji: "⛈️", label: "激しい雷雨", category: "thunder" },
    392: { emoji: "⛈️", label: "雷雪", category: "thunder" },
    395: { emoji: "⛈️", label: "激しい雷雪", category: "thunder" }
  };

  const CATEGORY_ACCENT = {
    sunny:   { accent: "#fb923c", soft: "rgba(251, 146, 60, 0.35)" },
    cloud:   { accent: "#94a3b8", soft: "rgba(148, 163, 184, 0.35)" },
    fog:     { accent: "#a1a1aa", soft: "rgba(161, 161, 170, 0.35)" },
    rain:    { accent: "#38bdf8", soft: "rgba(56, 189, 248, 0.35)" },
    snow:    { accent: "#67e8f9", soft: "rgba(103, 232, 249, 0.35)" },
    thunder: { accent: "#a78bfa", soft: "rgba(167, 139, 250, 0.35)" }
  };

  function getWeatherInfo(code){
    return WEATHER_CODE_MAP[code] || { emoji: "❓", label: "不明", category: "cloud" };
  }

  function applyAccent(category){
    const theme = CATEGORY_ACCENT[category] || CATEGORY_ACCENT.cloud;
    document.documentElement.style.setProperty("--accent", theme.accent);
    document.documentElement.style.setProperty("--accent-soft", theme.soft);
  }

  const cardEl = document.getElementById("card");
  const tabsEl = document.getElementById("cityTabs");
  const indicatorEl = document.getElementById("tabIndicator");
  let currentCity = "takamatsu";
  let requestToken = 0;

  function moveIndicator(btn){
    indicatorEl.style.left = btn.offsetLeft + "px";
    indicatorEl.style.width = btn.offsetWidth + "px";
  }

  function renderLoading(){
    cardEl.innerHTML = `
      <div class="state" id="loadingState">
        <div class="spinner"></div>
        <div>読み込み中...</div>
      </div>
    `;
  }

  function renderError(message){
    cardEl.innerHTML = `
      <div class="state error">
        <div class="glyph">⚠️</div>
        <div>${message}</div>
        <button class="retry-btn" id="retryBtn">再読み込み</button>
      </div>
    `;
    const retryBtn = document.getElementById("retryBtn");
    if (retryBtn) retryBtn.addEventListener("click", () => loadCity(currentCity));
  }

  function renderWeather(city, data){
    const current = data.current_condition[0];
    const today = data.weather[0];
    const info = getWeatherInfo(Number(current.weatherCode));
    applyAccent(info.category);
    const updatedStr = new Date().toLocaleString("ja-JP", { timeZone: "Asia/Tokyo", month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });

    const maxT = today ? Math.round(today.maxtempC) : null;
    const minT = today ? Math.round(today.mintempC) : null;

    cardEl.innerHTML = `
      <div class="content">
        <div class="location">
          <div class="city-name">${city.name}</div>
          <div class="updated">${updatedStr} 更新</div>
        </div>
        <div class="main-weather">
          <div class="icon-wrap">
            <div class="icon-glow"></div>
            <div class="emoji">${info.emoji}</div>
          </div>
          <div class="temp-block">
            <div class="temp">${Math.round(current.temp_C)}<sup>°C</sup></div>
            <div class="condition">${info.label}</div>
          </div>
        </div>
        <div class="feels-like">体感温度 ${Math.round(current.FeelsLikeC)}°C</div>
        <div class="stats">
          <div class="stat">
            <span class="stat-icon">🌡️</span>
            <div class="label">最高 / 最低</div>
            <div class="value">${maxT !== null ? maxT : "--"}° / ${minT !== null ? minT : "--"}°</div>
          </div>
          <div class="stat">
            <span class="stat-icon">💧</span>
            <div class="label">湿度</div>
            <div class="value">${Math.round(current.humidity)}<span class="unit">%</span></div>
          </div>
          <div class="stat">
            <span class="stat-icon">💨</span>
            <div class="label">風速</div>
            <div class="value">${Math.round(current.windspeedKmph)}<span class="unit">km/h</span></div>
          </div>
        </div>
      </div>
    `;
  }

  async function loadCity(cityKey){
    currentCity = cityKey;
    const city = CITIES[cityKey];
    const token = ++requestToken;
    renderLoading();

    const url = `https://wttr.in/${city.lat},${city.lon}?format=j1`;

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);

    try {
      const res = await fetch(url, { signal: controller.signal });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (token !== requestToken) return; // stale response, ignore
      renderWeather(city, data);
    } catch (err) {
      if (token !== requestToken) return;
      const message = err.name === "AbortError"
        ? "接続がタイムアウトしました。通信環境を確認してください。"
        : "天気データの取得に失敗しました。通信環境を確認してください。";
      renderError(message);
    } finally {
      clearTimeout(timeoutId);
    }
  }

  tabsEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-city]");
    if (!btn) return;
    tabsEl.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    moveIndicator(btn);
    loadCity(btn.dataset.city);
  });

  window.addEventListener("resize", () => {
    const active = tabsEl.querySelector("button.active");
    if (active) moveIndicator(active);
  });

  moveIndicator(tabsEl.querySelector("button.active"));
  loadCity(currentCity);
})();
</script>
</body>
</html>
